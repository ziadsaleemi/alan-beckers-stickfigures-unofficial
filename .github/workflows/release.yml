name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create or update, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set release version
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag_name }}"
          fi
          version="${tag#v}"
          if [[ ! "$version" =~ ^[0-9]+(\.[0-9]+){0,2}$ ]]; then
            version="1.0.0"
          fi
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        shell: bash
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CERTIFICATE_P12:-}" ] || [ -z "${MACOS_CERTIFICATE_PASSWORD:-}" ]; then
            echo "Missing MACOS_CERTIFICATE_P12 or MACOS_CERTIFICATE_PASSWORD secrets." >&2
            echo "Export a Developer ID Application certificate as a .p12 file and add it to GitHub Secrets before tagging a macOS release." >&2
            exit 1
          fi

          keychain_password="${MACOS_KEYCHAIN_PASSWORD:-temporary-release-keychain-password}"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
          certificate_path="$RUNNER_TEMP/developer-id.p12"

          printf '%s' "$MACOS_CERTIFICATE_P12" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Prepare App Store Connect API key
        shell: bash
        env:
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
        run: |
          set -euo pipefail
          if [ -n "${MACOS_NOTARY_KEY:-}" ]; then
            key_path="$RUNNER_TEMP/AuthKey_${MACOS_NOTARY_KEY_ID}.p8"
            printf '%s' "$MACOS_NOTARY_KEY" > "$key_path"
            chmod 600 "$key_path"
            echo "MACOS_NOTARY_KEY_PATH=$key_path" >> "$GITHUB_ENV"
          fi

      - name: Build DMG
        env:
          MACOS_REQUIRE_NOTARIZATION: "1"
          MACOS_NOTARIZE: "1"
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        run: ./script/package_macos.sh

      - name: Inspect DMG
        run: |
          hdiutil imageinfo dist/Alan-Beckers-Stickfigures-macOS.dmg
          spctl -a -t open --context context:primary-signature -v dist/Alan-Beckers-Stickfigures-macOS.dmg

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/Alan-Beckers-Stickfigures-macOS.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          $wixPath = "${env:ProgramFiles(x86)}\WiX Toolset v3.11\bin"
          if (Test-Path $wixPath) {
            Add-Content -Path $env:GITHUB_PATH -Value $wixPath
          }

      - name: Build EXE installer
        shell: pwsh
        env:
          WINDOWS_REQUIRE_SIGNING: "1"
          WINDOWS_CODESIGN_PFX_B64: ${{ secrets.WINDOWS_CODESIGN_PFX_B64 }}
          WINDOWS_CODESIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PFX_PASSWORD }}
          WINDOWS_CODESIGN_TIMESTAMP_URL: ${{ vars.WINDOWS_CODESIGN_TIMESTAMP_URL }}
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag_name }}"
          }
          $version = $tag -replace '^v', ''
          if ($version -notmatch '^\d+(\.\d+){0,3}$') {
            $version = "1.0.0"
          }
          ./script/package_windows.ps1 -Version $version

      - name: Inspect Windows signature
        shell: pwsh
        run: |
          $signature = Get-AuthenticodeSignature "dist/Alan-Beckers-Stickfigures-Windows.exe"
          $signature | Format-List
          if ($signature.Status -ne "Valid") {
            throw "Windows installer signature is not valid: $($signature.Status)"
          }

      - name: Upload Windows EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/Alan-Beckers-Stickfigures-Windows.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Prepare source archive
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="${{ inputs.tag_name }}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
          git archive --format=zip --output "release-assets/Alan-Beckers-Stickfigures-source-${release_tag}.zip" HEAD
          cat > release-notes.md <<NOTES
          Built release assets:
          - macOS DMG
          - Windows EXE installer
          - Source ZIP

          Platform notes:
          - Windows includes the patched Java runtime, image sets, Hold Pointer action, and transparent-window shadow fix.
          - Windows uses the original tray/config flow for choosing active stickfigures and interactive windows.
          - macOS uses the native Swift/AppKit menu-bar app, settings window, multi-display desktop handling, normal-window awareness, and visible-Dock handling.

          GitHub also provides the standard Source code archives for this tag.
          NOTES

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(release-assets/*)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found." >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --title "Alan Beckers Stickfigures $RELEASE_TAG" \
              --notes-file release-notes.md
          fi
